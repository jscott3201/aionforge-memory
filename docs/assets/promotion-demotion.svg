<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="650" viewBox="0 0 1280 650" role="img" aria-labelledby="title desc">
<title id="title">Aionforge Memory promotion and demotion</title>
<desc id="desc">A state diagram explaining cross-namespace fact promotion, policy gates, global copy creation, and demotion conditions.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#5b6b82"/>
  </marker>
  <marker id="arrowSoft" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#7c8aa1"/>
  </marker>
  <filter id="shadow" x="-10%" y="-10%" width="120%" height="140%">
    <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#152033" flood-opacity="0.08"/>
  </filter>
  <style>
  .bg { fill: #fbfcfe; }
  .title { font: 700 30px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #172033; }
  .subtitle { font: 400 15px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #536179; }
  .section { font: 700 17px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #24324a; }
  .label { font: 700 14px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #1f2937; }
  .small { font: 400 12px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #4b5563; }
  .tiny { font: 400 11px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #6b7280; }
  .mono { font: 600 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #374151; }
  .box { fill: #ffffff; stroke: #c9d5e4; stroke-width: 1.4; rx: 16; }
  .box-blue { fill: #eef6ff; stroke: #8ebce8; stroke-width: 1.5; rx: 16; }
  .box-green { fill: #effaf3; stroke: #8ed0a6; stroke-width: 1.5; rx: 16; }
  .box-purple { fill: #f4f0ff; stroke: #b5a1e8; stroke-width: 1.5; rx: 16; }
  .box-amber { fill: #fff7e6; stroke: #ecc36d; stroke-width: 1.5; rx: 16; }
  .box-red { fill: #fff1f2; stroke: #f2a7b5; stroke-width: 1.5; rx: 16; }
  .box-slate { fill: #f8fafc; stroke: #b8c4d4; stroke-width: 1.5; rx: 16; }
  .chip { fill: #ffffff; stroke: #d6dee9; stroke-width: 1.1; rx: 11; }
  .arrow { stroke: #5b6b82; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
  .arrow-soft { stroke: #7c8aa1; stroke-width: 1.8; fill: none; marker-end: url(#arrowSoft); }
  .arrow-dash { stroke: #7c8aa1; stroke-width: 2; fill: none; stroke-dasharray: 7 6; marker-end: url(#arrowSoft); }
  .muted-line { stroke: #dbe3ee; stroke-width: 1; }
  .dash-box { fill: #ffffff; stroke: #a8b4c4; stroke-width: 1.6; stroke-dasharray: 7 5; rx: 18; }
</style>
</defs>
<rect width="1280" height="650" class="bg"/>
<text x="50" y="48" text-anchor="start" class="title">Promotion and demotion: cross-namespace attestation, not ranking</text><text x="52" y="74" text-anchor="start" class="subtitle">A promoted fact is copied into a global namespace when policy and attestation gates pass. The team original is not mutated.</text><rect x="70" y="190" width="190" height="80" class="box-green" filter="url(#shadow)"/><text x="90" y="220" text-anchor="start" class="section">Team fact</text><text x="92" y="245" text-anchor="start" class="small"><tspan x="92" dy="0">• current fact</tspan><tspan x="92" dy="18">• team namespace</tspan></text><rect x="330" y="175" width="220" height="130" class="box-blue" filter="url(#shadow)"/><text x="350" y="205" text-anchor="start" class="section">Evaluate gates</text><text x="352" y="230" text-anchor="start" class="small"><tspan x="352" dy="0">• policy enabled</tspan><tspan x="352" dy="18">• current fact</tspan><tspan x="352" dy="18">• distinct attester quorum</tspan><tspan x="352" dy="18">• Beta posterior meets threshold</tspan></text><rect x="650" y="190" width="210" height="80" class="box-purple" filter="url(#shadow)"/><text x="670" y="220" text-anchor="start" class="section">Global copy</text><text x="672" y="245" text-anchor="start" class="small"><tspan x="672" dy="0">• copy, not merge</tspan><tspan x="672" dy="18">• PROMOTED_TO</tspan></text><rect x="980" y="190" width="210" height="80" class="box-red" filter="url(#shadow)"/><text x="1000" y="220" text-anchor="start" class="section">Demoted copy</text><text x="1002" y="245" text-anchor="start" class="small"><tspan x="1002" dy="0">• quarantined global fact</tspan><tspan x="1002" dy="18">• DEMOTED_FROM</tspan></text><path d="M 260 230 L 315 230" class="arrow"/><path d="M 550 230 L 635 230" class="arrow"/><path d="M 860 230 L 965 230" class="arrow"/><text x="590" y="216" text-anchor="middle" class="tiny">all gates pass</text><text x="915" y="216" text-anchor="middle" class="tiny">lost support or reliability fell</text><path d="M 420 305 C 420 380 165 380 165 275" class="arrow-dash"/><text x="305" y="372" text-anchor="middle" class="tiny">gate fails: stay team-local</text><rect x="115" y="430" width="470" height="105" class="box-amber" filter="url(#shadow)"/><text x="145" y="464" text-anchor="start" class="section">Not search ranking</text><text x="145" y="494" text-anchor="start" class="small"><tspan x="145" dy="0">Promotion/demotion changes namespace-level attestation state.</tspan><tspan x="145" dy="20">It does not make a result rank higher in recall.</tspan></text><rect x="690" y="430" width="470" height="105" class="box-slate" filter="url(#shadow)"/><text x="720" y="464" text-anchor="start" class="section">Original remains intact</text><text x="720" y="494" text-anchor="start" class="small"><tspan x="720" dy="0">The team fact is left untouched when a global copy is promoted.</tspan><tspan x="720" dy="20">Demotion quarantines the global copy, not the team original.</tspan></text>
</svg>
