<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="850" viewBox="0 0 1400 850" role="img" aria-labelledby="title desc">
<title id="title">Aionforge Memory lifecycle</title>
<desc id="desc">A flowchart for capture acceptance, deterministic consolidation, recall, and optional lifecycle tail operations.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#5b6b82"/>
  </marker>
  <marker id="arrowSoft" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#7c8aa1"/>
  </marker>
  <filter id="shadow" x="-10%" y="-10%" width="120%" height="140%">
    <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#152033" flood-opacity="0.08"/>
  </filter>
  <style>
  .bg { fill: #fbfcfe; }
  .title { font: 700 30px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #172033; }
  .subtitle { font: 400 15px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #536179; }
  .section { font: 700 17px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #24324a; }
  .label { font: 700 14px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #1f2937; }
  .small { font: 400 12px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #4b5563; }
  .tiny { font: 400 11px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #6b7280; }
  .mono { font: 600 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #374151; }
  .box { fill: #ffffff; stroke: #c9d5e4; stroke-width: 1.4; rx: 16; }
  .box-blue { fill: #eef6ff; stroke: #8ebce8; stroke-width: 1.5; rx: 16; }
  .box-green { fill: #effaf3; stroke: #8ed0a6; stroke-width: 1.5; rx: 16; }
  .box-purple { fill: #f4f0ff; stroke: #b5a1e8; stroke-width: 1.5; rx: 16; }
  .box-amber { fill: #fff7e6; stroke: #ecc36d; stroke-width: 1.5; rx: 16; }
  .box-red { fill: #fff1f2; stroke: #f2a7b5; stroke-width: 1.5; rx: 16; }
  .box-slate { fill: #f8fafc; stroke: #b8c4d4; stroke-width: 1.5; rx: 16; }
  .chip { fill: #ffffff; stroke: #d6dee9; stroke-width: 1.1; rx: 11; }
  .arrow { stroke: #5b6b82; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
  .arrow-soft { stroke: #7c8aa1; stroke-width: 1.8; fill: none; marker-end: url(#arrowSoft); }
  .arrow-dash { stroke: #7c8aa1; stroke-width: 2; fill: none; stroke-dasharray: 7 6; marker-end: url(#arrowSoft); }
  .muted-line { stroke: #dbe3ee; stroke-width: 1; }
  .dash-box { fill: #ffffff; stroke: #a8b4c4; stroke-width: 1.6; stroke-dasharray: 7 5; rx: 18; }
</style>
</defs>
<rect width="1400" height="850" class="bg"/>
<text x="50" y="48" text-anchor="start" class="title">Lifecycle: capture -> consolidate -> recall -> forget</text><text x="52" y="74" text-anchor="start" class="subtitle">Accepted captures commit atomically. Consolidation adds derived nodes in the background. Lifecycle tail behavior is explicit and off by default.</text><rect x="40" y="110" width="1320" height="160" class="box-blue" filter="url(#shadow)"/><text x="70" y="143" text-anchor="start" class="section">Synchronous capture gate</text><rect x="75" y="175" width="145" height="55" class="box" filter="url(#shadow)"/><text x="147.5" y="199" text-anchor="middle" class="small"><tspan x="147.5" dy="0">capture request</tspan></text><rect x="260" y="175" width="145" height="55" class="box" filter="url(#shadow)"/><text x="332.5" y="199" text-anchor="middle" class="small"><tspan x="332.5" dy="0">role gate</tspan></text><rect x="445" y="175" width="185" height="55" class="box" filter="url(#shadow)"/><text x="537.5" y="199" text-anchor="middle" class="small"><tspan x="537.5" dy="0">privacy filter +</tspan><tspan x="537.5" dy="15">injection excision</tspan></text><rect x="675" y="175" width="160" height="55" class="box" filter="url(#shadow)"/><text x="755.0" y="199" text-anchor="middle" class="small"><tspan x="755.0" dy="0">residue check</tspan></text><rect x="880" y="175" width="160" height="55" class="box" filter="url(#shadow)"/><text x="960.0" y="199" text-anchor="middle" class="small"><tspan x="960.0" dy="0">content hash</tspan></text><rect x="1085" y="175" width="210" height="55" class="box" filter="url(#shadow)"/><text x="1190.0" y="199" text-anchor="middle" class="small"><tspan x="1190.0" dy="0">atomic commit:</tspan><tspan x="1190.0" dy="15">Episode + provenance + audit</tspan></text><path d="M 220 202 L 246 202" class="arrow"/><path d="M 405 202 L 431 202" class="arrow"/><path d="M 630 202 L 661 202" class="arrow"/><path d="M 835 202 L 866 202" class="arrow"/><path d="M 1040 202 L 1071 202" class="arrow"/><rect x="260" y="300" width="145" height="45" class="box-red" filter="url(#shadow)"/><text x="332" y="328" text-anchor="middle" class="tiny">system role: reject + audit</text><path d="M 333 230 L 333 296" class="arrow-dash"/><rect x="675" y="300" width="160" height="45" class="box-red" filter="url(#shadow)"/><text x="755" y="328" text-anchor="middle" class="tiny">residue-only: reject + audit</text><path d="M 755 230 L 755 296" class="arrow-dash"/><rect x="880" y="300" width="160" height="45" class="box-amber" filter="url(#shadow)"/><text x="960" y="328" text-anchor="middle" class="tiny">duplicate: receipt only</text><path d="M 960 230 L 960 296" class="arrow-dash"/><rect x="40" y="395" width="840" height="345" class="box-purple" filter="url(#shadow)"/><text x="70" y="428" text-anchor="start" class="section">Background consolidation - deterministic, no live LLM</text><rect x="80" y="465" width="190" height="55" class="box" filter="url(#shadow)"/><text x="175.0" y="488" text-anchor="middle" class="small"><tspan x="175.0" dy="0">pick raw episodes</tspan><tspan x="175.0" dy="15">in commit order</tspan></text><rect x="315" y="465" width="150" height="55" class="box" filter="url(#shadow)"/><text x="390.0" y="488" text-anchor="middle" class="small"><tspan x="390.0" dy="0">extract Facts</tspan><tspan x="390.0" dy="15">rule patterns</tspan></text><rect x="510" y="465" width="165" height="55" class="box" filter="url(#shadow)"/><text x="592.5" y="488" text-anchor="middle" class="small"><tspan x="592.5" dy="0">resolve Entities</tspan><tspan x="592.5" dy="15">coref / exact / cluster</tspan></text><rect x="715" y="465" width="120" height="55" class="box" filter="url(#shadow)"/><text x="775.0" y="488" text-anchor="middle" class="small"><tspan x="775.0" dy="0">detect belief</tspan><tspan x="775.0" dy="15">revision</tspan></text><rect x="315" y="595" width="180" height="55" class="box" filter="url(#shadow)"/><text x="405.0" y="618" text-anchor="middle" class="small"><tspan x="405.0" dy="0">summarize clusters</tspan><tspan x="405.0" dy="15">into Notes</tspan></text><rect x="555" y="595" width="260" height="55" class="box" filter="url(#shadow)"/><text x="685.0" y="618" text-anchor="middle" class="small"><tspan x="685.0" dy="0">materialize derived nodes +</tspan><tspan x="685.0" dy="15">flip episode to consolidated</tspan></text><path d="M 270 492 L 300 492" class="arrow"/><path d="M 465 492 L 495 492" class="arrow"/><path d="M 675 492 L 700 492" class="arrow"/><path d="M 775 520 C 775 560 470 560 430 592" class="arrow"/><path d="M 495 622 L 540 622" class="arrow"/><path d="M 1190 230 C 1190 340 810 340 760 462" class="arrow-soft"/><rect x="930" y="395" width="430" height="345" class="box-green" filter="url(#shadow)"/><text x="960" y="428" text-anchor="start" class="section">Graph, recall, and lifecycle controls</text><rect x="980" y="465" width="150" height="60" class="box" filter="url(#shadow)"/><text x="1055" y="500" text-anchor="middle" class="label">the graph</text><rect x="1175" y="465" width="140" height="60" class="box-slate" filter="url(#shadow)"/><text x="1245" y="489" text-anchor="middle" class="tiny"><tspan x="1245" dy="0">recall:</tspan><tspan x="1245" dy="13">keyword + vector</tspan><tspan x="1245" dy="13">RRF + core</tspan></text><path d="M 815 622 C 890 622 910 495 975 495" class="arrow"/><path d="M 1130 495 L 1160 495" class="arrow"/><rect x="980" y="585" width="335" height="120" class="dash-box" filter="url(#shadow)"/><text x="1005" y="618" text-anchor="start" class="section">Lifecycle tail - off by default</text><text x="1005" y="646" text-anchor="start" class="small"><tspan x="1005" dy="0">pin/unpin, decay, soft-forget</tspan><tspan x="1005" dy="19">erase by DERIVED_FROM cascade</tspan><tspan x="1005" dy="19">promotion/demotion across namespaces</tspan></text><path d="M 1055 525 L 1055 580" class="arrow-dash"/>
</svg>
