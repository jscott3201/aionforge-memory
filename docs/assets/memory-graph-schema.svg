<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="920" viewBox="0 0 1400 920" role="img" aria-labelledby="title desc">
<title id="title">Aionforge Memory graph schema</title>
<desc id="desc">A diagram showing memory-bearing nodes, scaffolding nodes, and the relationship groups that connect episodes, facts, entities, provenance, notes, skills, and audit events.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#5b6b82"/>
  </marker>
  <marker id="arrowSoft" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#7c8aa1"/>
  </marker>
  <filter id="shadow" x="-10%" y="-10%" width="120%" height="140%">
    <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#152033" flood-opacity="0.08"/>
  </filter>
  <style>
  .bg { fill: #fbfcfe; }
  .title { font: 700 30px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #172033; }
  .subtitle { font: 400 15px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #536179; }
  .section { font: 700 17px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #24324a; }
  .label { font: 700 14px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #1f2937; }
  .small { font: 400 12px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #4b5563; }
  .tiny { font: 400 11px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #6b7280; }
  .mono { font: 600 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #374151; }
  .box { fill: #ffffff; stroke: #c9d5e4; stroke-width: 1.4; rx: 16; }
  .box-blue { fill: #eef6ff; stroke: #8ebce8; stroke-width: 1.5; rx: 16; }
  .box-green { fill: #effaf3; stroke: #8ed0a6; stroke-width: 1.5; rx: 16; }
  .box-purple { fill: #f4f0ff; stroke: #b5a1e8; stroke-width: 1.5; rx: 16; }
  .box-amber { fill: #fff7e6; stroke: #ecc36d; stroke-width: 1.5; rx: 16; }
  .box-red { fill: #fff1f2; stroke: #f2a7b5; stroke-width: 1.5; rx: 16; }
  .box-slate { fill: #f8fafc; stroke: #b8c4d4; stroke-width: 1.5; rx: 16; }
  .chip { fill: #ffffff; stroke: #d6dee9; stroke-width: 1.1; rx: 11; }
  .arrow { stroke: #5b6b82; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
  .arrow-soft { stroke: #7c8aa1; stroke-width: 1.8; fill: none; marker-end: url(#arrowSoft); }
  .arrow-dash { stroke: #7c8aa1; stroke-width: 2; fill: none; stroke-dasharray: 7 6; marker-end: url(#arrowSoft); }
  .muted-line { stroke: #dbe3ee; stroke-width: 1; }
  .dash-box { fill: #ffffff; stroke: #a8b4c4; stroke-width: 1.6; stroke-dasharray: 7 5; rx: 18; }
</style>
</defs>
<rect width="1400" height="920" class="bg"/>
<text x="50" y="48" text-anchor="start" class="title">Graph schema: memory core plus first-class scaffolding</text><text x="52" y="74" text-anchor="start" class="subtitle">Seven memory-bearing node kinds carry Stats. Twelve scaffolding kinds carry Identity only and support provenance, audit, validity, work, and versioning.</text><rect x="40" y="105" width="420" height="260" class="box-green" filter="url(#shadow)"/><text x="65" y="138" text-anchor="start" class="section">Memory-bearing nodes</text><text x="65" y="163" text-anchor="start" class="small">Carry Identity + Stats; participate in decay and forgetting.</text><rect x="65" y="190" width="115" height="28" class="chip"/><text x="122.5" y="209" text-anchor="middle" class="mono">Episode</text><rect x="195" y="190" width="95" height="28" class="chip"/><text x="242.5" y="209" text-anchor="middle" class="mono">Fact</text><rect x="305" y="190" width="105" height="28" class="chip"/><text x="357.5" y="209" text-anchor="middle" class="mono">Entity</text><rect x="65" y="232" width="90" height="28" class="chip"/><text x="110.0" y="251" text-anchor="middle" class="mono">Note</text><rect x="170" y="232" width="90" height="28" class="chip"/><text x="215.0" y="251" text-anchor="middle" class="mono">Skill</text><rect x="275" y="232" width="125" height="28" class="chip"/><text x="337.5" y="251" text-anchor="middle" class="mono">BadPattern</text><rect x="65" y="274" width="125" height="28" class="chip"/><text x="127.5" y="293" text-anchor="middle" class="mono">CoreBlock</text><text x="65" y="335" text-anchor="start" class="small">Search-visible: Episode, Fact, CoreBlock</text><rect x="40" y="405" width="420" height="400" class="box-slate" filter="url(#shadow)"/><text x="65" y="438" text-anchor="start" class="section">Scaffolding nodes</text><text x="65" y="463" text-anchor="start" class="small">Carry Identity only; exempt from decay.</text><rect x="65" y="492" width="165" height="28" class="chip"/><text x="147.5" y="511" text-anchor="middle" class="mono">Agent</text><rect x="265" y="492" width="165" height="28" class="chip"/><text x="347.5" y="511" text-anchor="middle" class="mono">MemSession</text><rect x="65" y="536" width="165" height="28" class="chip"/><text x="147.5" y="555" text-anchor="middle" class="mono">WorkItem</text><rect x="265" y="536" width="165" height="28" class="chip"/><text x="347.5" y="555" text-anchor="middle" class="mono">Tag</text><rect x="65" y="580" width="190" height="28" class="chip"/><text x="160.0" y="599" text-anchor="middle" class="mono">ProvenanceRecord</text><rect x="265" y="580" width="165" height="28" class="chip"/><text x="347.5" y="599" text-anchor="middle" class="mono">AuditEvent</text><rect x="65" y="624" width="165" height="28" class="chip"/><text x="147.5" y="643" text-anchor="middle" class="mono">Promotion</text><rect x="265" y="624" width="165" height="28" class="chip"/><text x="347.5" y="643" text-anchor="middle" class="mono">Scope</text><rect x="65" y="668" width="165" height="28" class="chip"/><text x="147.5" y="687" text-anchor="middle" class="mono">RecencyWindow</text><rect x="265" y="668" width="165" height="28" class="chip"/><text x="347.5" y="687" text-anchor="middle" class="mono">ValidityAnchor</text><rect x="65" y="712" width="190" height="28" class="chip"/><text x="160.0" y="731" text-anchor="middle" class="mono">ConsolidationCursor</text><rect x="265" y="712" width="165" height="28" class="chip"/><text x="347.5" y="731" text-anchor="middle" class="mono">SchemaVersion</text><rect x="500" y="105" width="850" height="700" class="box" filter="url(#shadow)"/><text x="530" y="138" text-anchor="start" class="section">Relationship map</text><text x="530" y="163" text-anchor="start" class="small">Edges preserve source lineage, currentness, trust, scope, and recall behavior.</text><rect x="545" y="245" width="150" height="70" class="box-blue" filter="url(#shadow)"/><text x="620.0" y="285.0" text-anchor="middle" class="label">Episode</text><rect x="780" y="305" width="160" height="80" class="box-green" filter="url(#shadow)"/><text x="860.0" y="350.0" text-anchor="middle" class="label">Fact</text><rect x="1080" y="245" width="150" height="70" class="box-purple" filter="url(#shadow)"/><text x="1155.0" y="285.0" text-anchor="middle" class="label">Entity</text><rect x="545" y="405" width="150" height="60" class="box-slate" filter="url(#shadow)"/><text x="620.0" y="440.0" text-anchor="middle" class="label">MemSession</text><rect x="1045" y="405" width="185" height="60" class="box-amber" filter="url(#shadow)"/><text x="1137.5" y="440.0" text-anchor="middle" class="label">Provenance</text><rect x="1045" y="495" width="185" height="60" class="box-amber" filter="url(#shadow)"/><text x="1137.5" y="530.0" text-anchor="middle" class="label">Validity/Scope</text><rect x="545" y="595" width="150" height="65" class="box-purple" filter="url(#shadow)"/><text x="620.0" y="632.5" text-anchor="middle" class="label">Note</text><rect x="780" y="595" width="150" height="65" class="box-purple" filter="url(#shadow)"/><text x="855.0" y="632.5" text-anchor="middle" class="label">Skill</text><rect x="1010" y="595" width="150" height="65" class="box-red" filter="url(#shadow)"/><text x="1085.0" y="632.5" text-anchor="middle" class="label">BadPattern</text><rect x="780" y="705" width="160" height="60" class="box-slate" filter="url(#shadow)"/><text x="860.0" y="740.0" text-anchor="middle" class="label">AuditEvent</text><path d="M 695 280 L 775 330" class="arrow-soft"/><path d="M 695 265 L 1075 265" class="arrow-soft"/><path d="M 940 335 L 1075 280" class="arrow-soft"/><path d="M 620 315 L 620 400" class="arrow-soft"/><path d="M 940 355 L 1040 425" class="arrow-soft"/><path d="M 940 375 L 1040 520" class="arrow-soft"/><path d="M 620 590 L 620 470" class="arrow-soft"/><path d="M 930 627 L 1005 627" class="arrow-soft"/><path d="M 855 595 C 855 545 855 545 855 510 C 855 470 815 470 815 510 C 815 545 815 545 815 595" class="arrow-soft"/><path d="M 860 385 C 775 455 765 520 810 595" class="arrow-soft"/><path d="M 860 705 L 860 390" class="arrow-soft"/><text x="705" y="303" text-anchor="start" class="tiny">SUPPORTS</text><text x="850" y="255" text-anchor="start" class="tiny">MENTIONS</text><text x="1000" y="305" text-anchor="start" class="tiny">ABOUT</text><text x="628" y="365" text-anchor="start" class="tiny">IN_SESSION</text><text x="953" y="416" text-anchor="start" class="tiny">provenance + attestations</text><text x="952" y="505" text-anchor="start" class="tiny">validity, scope, recency, tags</text><text x="628" y="540" text-anchor="start" class="tiny">DERIVED_FROM</text><text x="945" y="616" text-anchor="start" class="tiny">HAS_FAILURE</text><text x="727" y="533" text-anchor="start" class="tiny">fact-to-fact belief edges</text><text x="872" y="562" text-anchor="start" class="tiny">DEPENDS_ON</text><text x="872" y="690" text-anchor="start" class="tiny">AUDIT</text><rect x="530" y="830" width="800" height="55" class="box-amber" filter="url(#shadow)"/><text x="555" y="862" text-anchor="start" class="small">Key rule: currentness is graph semantics. Fact.status is a mirror, while ABOUT, SUPERSEDED_BY, and CONTRADICTS edges drive recall exclusion.</text>
</svg>
