# cargo-deny baseline for aionforge-memory.
#
# Mirrors the selene-db substrate's posture (Aionforge consumes selene-db as a
# git dependency tracking its `development` branch and inherits its transitive
# tree, so the license allow-list, the rustls-only bans, and the duplicate-version
# skips must agree):
#   - rustls-only TLS posture: native-tls and openssl* (the alternative TLS
#     implementations) are banned, PLUS aws-lc-rs/aws-lc-sys, so rustls with the
#     *ring* provider is the only TLS+crypto backend. reqwest 0.13 verifies server
#     certs through rustls-platform-verifier, which reads the OS trust store via
#     schannel (Windows) / security-framework (macOS) / openssl-probe (Linux); those
#     are cert-store readers, not TLS stacks, so they are permitted. The deployment
#     image therefore ships a CA bundle (it is not OS-trust-store-free).
#   - dual MIT OR Apache-2.0 posture; permissive allow-list for transitive deps;
#     MPL-2.0 allowed (imbl via selene-db; webpki-roots); CDLA-Permissive-2.0 allowed
#     (webpki-root-certs via the platform verifier)
#   - crates.io as the only registry; git deps must be pinned to a sha

[graph]
all-features = false
no-default-features = false

[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
# Documented advisory ignores must carry reason + owner.
ignore = [
  # owner: jscott. atomic-polyfill is unmaintained (RUSTSEC-2023-0089) but is not a
  # vulnerability. It enters only transitively through the selene-db substrate
  # (postcard -> selene-persist), which Aionforge consumes read-only and pins; the fix
  # belongs upstream in selene-db, not here. Accepted so the nightly audit stays green.
  { id = "RUSTSEC-2023-0089", reason = "unmaintained, non-vuln; transitive via selene-db (postcard); fixed upstream; owner jscott" },
]

[licenses]
version = 2
confidence-threshold = 0.93
allow = [
  "MIT",
  "MIT-0",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "CC0-1.0",
  "Zlib",
  "BSL-1.0",
  # MPL-2.0: file-level copyleft (NOT infectious to dependents). Reaches the
  # tree via imbl (through the selene-db path dep) and webpki-roots. Aionforge
  # itself stays dual MIT/Apache-2.0.
  "MPL-2.0",
  # CDLA-Permissive-2.0: a permissive data license (no copyleft, no patent or
  # distribution restrictions on dependents). Reaches the tree via webpki-root-certs,
  # which rustls-platform-verifier (under reqwest 0.13) pulls only as a dev-dependency
  # and a wasm32-target dependency — the native release binary verifies certs through
  # the OS trust store, not this crate. cargo-deny scans all targets, so the license
  # must still be allowed. Aionforge itself stays dual MIT/Apache-2.0.
  "CDLA-Permissive-2.0",
]
exceptions = []

[bans]
multiple-versions = "deny"
wildcards = "deny"
highlight = "all"
deny = [
  # rustls-only TLS posture: ban the alternative TLS implementations. The OS
  # cert-store readers schannel / security-framework / openssl-probe are NOT banned
  # here — reqwest 0.13's rustls-platform-verifier pulls them to validate certs, and
  # they carry no TLS stack of their own (see the header note).
  { name = "native-tls" },
  { name = "openssl-sys" },
  { name = "openssl-src" },
  { name = "openssl" },
  # Force the rustls *ring* crypto provider: aws-lc-rs needs cmake/Go and fails
  # on musl, breaking the static Alpine (musl) image. ring is musl-clean.
  { name = "aws-lc-rs" },
  { name = "aws-lc-sys" },
]
# Duplicate-version lines inherited through the selene-db git dep plus the tokio /
# reqwest / hyper / ratatui / dalek tree. Each entry needs a documented,
# owner-attributed reason added here after a lockfile review; re-audit on every
# `cargo update` and when the substrate pin moves.
skip = [
  # Reviewed 2026-06-07 (jscott3201). Each line is a transitive duplicate where two
  # major lines legitimately coexist and deduping needs an upstream release we do not
  # control. We skip the OLDER version(s) and leave the newest unskipped, so a brand
  # new duplicate of any of these still trips the gate for re-review.
  #
  # cpufeatures: RustCrypto SIMD detection; 0.2 (sha2 line) vs 0.3 (newer hashes).
  { name = "cpufeatures", version = "=0.2.17" },
  # getrandom: 0.2 via ring (the rustls crypto provider) and 0.3 via rand_core; 0.4
  # (via uuid) is the newest and stays unskipped.
  { name = "getrandom", version = "=0.2.17" },
  { name = "getrandom", version = "=0.3.4" },
  # hashbrown: 0.16 via lru; 0.17 via indexmap + rkyv (selene-db) stays unskipped.
  { name = "hashbrown", version = "=0.16.1" },
  # r-efi: getrandom's UEFI backend, dragged in at two lines by the two getrandom
  # versions above.
  { name = "r-efi", version = "=5.3.0" },
  # rand_core: 0.6 is the line ed25519-dalek 2.x links, made graph-reachable by the
  # audit-key mint (M4.T06, the rand_core feature on the trust crate's dalek line);
  # 0.9 reaches through imbl/proptest (selene/test graph); 0.10 reaches through rmcp's
  # Streamable HTTP server-side nonce/session stack and stays unskipped as the newest
  # line. Dedup needs upstream convergence across dalek/selene/rmcp.
  { name = "rand_core", version = "=0.6.4" },
  { name = "rand_core", version = "=0.9.5" },
  # windows-sys (Windows targets only): 0.52 via the tokio/mio generation, 0.61 via
  # newer crates which stays unskipped.
  { name = "windows-sys", version = "=0.52.0" },
  # wit-bindgen: getrandom/wasi wasm backend at two lines.
  { name = "wit-bindgen", version = "=0.51.0" },
]
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
# selene-db is consumed as a git dependency tracking its `development` branch.
# Cargo.lock pins the exact commit (reproducible; CI builds `--locked`); the branch
# source is allow-listed here.
allow-git = ["ssh://git@github.com/Aionforge-Labs/selene-db.git"]
