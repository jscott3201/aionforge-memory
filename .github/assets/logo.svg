<svg viewBox="0 0 1200 360" xmlns="http://www.w3.org/2000/svg" font-family="'Eurostile','Bahnschrift','DIN Alternate','Arial Narrow',sans-serif">
  <defs>
    <radialGradient id="plate" cx="30%" cy="40%" r="90%">
      <stop offset="0%" stop-color="#16203D"/>
      <stop offset="60%" stop-color="#0E1426"/>
      <stop offset="100%" stop-color="#080B14"/>
    </radialGradient>
    <radialGradient id="coreL" cx="50%" cy="42%" r="60%">
      <stop offset="0%" stop-color="#FFF2C2"/>
      <stop offset="28%" stop-color="#FFD66B"/>
      <stop offset="58%" stop-color="#FF7A1A"/>
      <stop offset="100%" stop-color="#FF4D2E"/>
    </radialGradient>
    <filter id="gL" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="360" rx="20" fill="url(#plate)"/>
  <g fill="#A8B2C4">
    <circle cx="980" cy="60" r="1.4" opacity="0.6"/><circle cx="1120" cy="120" r="1" opacity="0.5"/>
    <circle cx="700" cy="300" r="1.2" opacity="0.5"/><circle cx="1080" cy="280" r="1" opacity="0.4"/>
  </g>

  <!-- compact orbital crucible mark -->
  <g>
    <circle cx="185" cy="180" r="150" fill="none" stroke="#2A3142" stroke-width="2"/>
    <circle cx="185" cy="180" r="150" fill="none" stroke="#2E6FF2" stroke-width="1" opacity="0.3"/>
    <g fill="none" stroke="#2E6FF2" stroke-width="2.2" opacity="0.85">
      <ellipse cx="185" cy="180" rx="112" ry="42" transform="rotate(0 185 180)"/>
      <ellipse cx="185" cy="180" rx="112" ry="42" transform="rotate(60 185 180)" stroke="#36C5F0"/>
      <ellipse cx="185" cy="180" rx="112" ry="42" transform="rotate(120 185 180)"/>
    </g>
    <line x1="185" y1="180" x2="290" y2="158" stroke="#2E6FF2" stroke-width="1" opacity="0.4"/>
    <line x1="185" y1="180" x2="92" y2="196" stroke="#2E6FF2" stroke-width="1" opacity="0.4"/>
    <circle cx="290" cy="158" r="7" fill="#FF7A1A"/>
    <circle cx="92" cy="196" r="6" fill="#36C5F0"/>
    <circle cx="185" cy="78" r="5" fill="#2E6FF2"/>
    <circle cx="232" cy="282" r="6" fill="#FFB23E"/>
    <circle cx="185" cy="180" r="40" fill="#FF7A1A" opacity="0.5" filter="url(#gL)"/>
    <circle cx="185" cy="180" r="32" fill="url(#coreL)"/>
    <ellipse cx="179" cy="170" rx="11" ry="7" fill="#FFF2C2" opacity="0.7"/>
  </g>

  <!-- divider -->
  <line x1="372" y1="92" x2="372" y2="268" stroke="#2A3142" stroke-width="2"/>

  <!-- wordmark -->
  <text x="410" y="198" font-size="94" font-weight="700" letter-spacing="2">
    <tspan fill="#E8ECF4">AION</tspan><tspan fill="#FF7A1A">FORGE</tspan>
  </text>
  <text x="414" y="252" font-size="30" fill="#36C5F0" letter-spacing="26" font-weight="600">MEMORY</text>
  <line x1="414" y1="272" x2="700" y2="272" stroke="#5B6577" stroke-width="1"/>
  <circle cx="414" cy="272" r="3" fill="#FF7A1A"/>
  <text x="716" y="276" font-size="15" fill="#5B6577" letter-spacing="3">MEMORY SUBSTRATE</text>
</svg>
