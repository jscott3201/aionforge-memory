# Tag-driven, gated release publishing for aionforge-memory.
#
# Releases are cut by pushing a SemVer tag (e.g. `v1.0.0`) onto `main`. This
# workflow re-runs the full comprehensive gate (release-gate.yml) against the
# tagged commit and, only if every check passes, publishes the GitHub Release.
# A release therefore can never ship code that has not passed the gate.
#
# The artifact payload includes linux glibc binaries built through the Debian
# Docker builder, macOS binaries, and the Debian runtime image pushed to GHCR
# for linux/amd64 and linux/arm64.
#
# crates.io publishing is intentionally deferred until the selene-db 1.x crates
# that Aionforge depends on are available from crates.io.
#
# workflow_dispatch runs the gate plus artifact/image build dry run by default;
# publishing still requires a tag push.
#
# Security: no `${{ github.event.* }}` in any `run:` (confined to if:/with:/env:).

name: release-publish

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      build_artifacts:
        description: Build release binaries and the GHCR image without publishing.
        type: boolean
        default: true

concurrency:
  group: release-publish-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"
  DOCKER_BUILD_RECORD_UPLOAD: "false"

permissions:
  contents: read

jobs:
  gate:
    name: gate
    uses: ./.github/workflows/release-gate.yml
    secrets: inherit

  linux-binaries:
    name: linux binary (${{ matrix.target }})
    needs: gate
    if: github.event_name == 'push' || inputs.build_artifacts
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            platform: linux/amd64
            runner: ubuntu-latest
            cache-scope: linux-binary-amd64
          - target: aarch64-unknown-linux-gnu
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            cache-scope: linux-binary-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: build linux binary artifact
        uses: docker/build-push-action@v6
        with:
          context: .
          target: binary-artifact
          platforms: ${{ matrix.platform }}
          outputs: type=local,dest=dist/${{ matrix.target }}
          cache-from: type=gha,scope=${{ matrix.cache-scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.cache-scope }}
      - name: package binary
        run: |
          chmod +x "dist/${{ matrix.target }}/aionforge"
          tar -C "dist/${{ matrix.target }}" -czf "dist/aionforge-${{ matrix.target }}.tar.gz" aionforge
          (cd dist && shasum -a 256 "aionforge-${{ matrix.target }}.tar.gz" > "aionforge-${{ matrix.target }}.tar.gz.sha256")
      - uses: actions/upload-artifact@v4
        with:
          name: aionforge-${{ matrix.target }}
          path: |
            dist/aionforge-${{ matrix.target }}.tar.gz
            dist/aionforge-${{ matrix.target }}.tar.gz.sha256
          if-no-files-found: error

  macos-binaries:
    name: macOS binary (${{ matrix.target }})
    needs: gate
    if: github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-apple-darwin
          - aarch64-apple-darwin
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: Swatinem/rust-cache@v2
      - name: add release target
        run: rustup target add "${{ matrix.target }}"
      - name: build release binary
        run: cargo build --locked --release -p aionforge-cli --target "${{ matrix.target }}"
      - name: package binary
        run: |
          mkdir -p "dist/${{ matrix.target }}"
          cp "target/${{ matrix.target }}/release/aionforge" "dist/${{ matrix.target }}/aionforge"
          chmod +x "dist/${{ matrix.target }}/aionforge"
          tar -C "dist/${{ matrix.target }}" -czf "dist/aionforge-${{ matrix.target }}.tar.gz" aionforge
          (cd dist && shasum -a 256 "aionforge-${{ matrix.target }}.tar.gz" > "aionforge-${{ matrix.target }}.tar.gz.sha256")
      - uses: actions/upload-artifact@v4
        with:
          name: aionforge-${{ matrix.target }}
          path: |
            dist/aionforge-${{ matrix.target }}.tar.gz
            dist/aionforge-${{ matrix.target }}.tar.gz.sha256
          if-no-files-found: error

  container-image:
    name: container image
    needs:
      - gate
      - linux-binaries
    if: github.event_name == 'push' || inputs.build_artifacts
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      packages: write
      # Keyless SLSA build provenance: OIDC token to sign, attestations to record.
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4
      - name: download Linux binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: aionforge-*-unknown-linux-gnu
          path: dist/linux-artifacts
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.event_name == 'push'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: prepare runtime image binaries
        run: |
          mkdir -p dist/docker/linux/amd64 dist/docker/linux/arm64
          tar -xzf dist/linux-artifacts/aionforge-x86_64-unknown-linux-gnu/aionforge-x86_64-unknown-linux-gnu.tar.gz \
            -C dist/docker/linux/amd64
          tar -xzf dist/linux-artifacts/aionforge-aarch64-unknown-linux-gnu/aionforge-aarch64-unknown-linux-gnu.tar.gz \
            -C dist/docker/linux/arm64
          chmod +x dist/docker/linux/amd64/aionforge dist/docker/linux/arm64/aionforge
      - name: compute runtime image metadata
        id: image
        env:
          TAG: ${{ github.ref_name }}
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          if [ "$GITHUB_EVENT_NAME" = "push" ]; then
            version="${TAG#v}"
          else
            version="dry-run"
          fi
          {
            echo "tags<<EOF"
            echo "$image:$version"
            if [[ "$version" != *-* && "$version" != "dry-run" ]]; then
              echo "$image:latest"
            fi
            echo "EOF"
            echo "version=$version"
            echo "name=$image"
          } >> "$GITHUB_OUTPUT"
      - name: build release runtime image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.release
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.image.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.image.outputs.version }}
          cache-from: type=gha,scope=runtime-image
          cache-to: type=gha,mode=max,scope=runtime-image
      # Bind a signed SLSA provenance attestation to the pushed image digest and
      # store it in GHCR alongside the image. Only on a real tag push (the image
      # is not pushed on the workflow_dispatch dry run). Verify with:
      #   gh attestation verify oci://ghcr.io/jscott3201/aionforge-memory:<ver> \
      #     --repo jscott3201/aionforge-memory
      - name: attest container image provenance
        if: github.event_name == 'push'
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ steps.image.outputs.name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  publish:
    name: publish github release
    needs:
      - gate
      - linux-binaries
      - macos-binaries
      - container-image
    # Publish only on an actual tag push; manual dispatch is a dry run.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
      # Keyless SLSA build provenance for the published release binaries.
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the tag-on-main ancestry check below can resolve.
          fetch-depth: 0
      - name: verify the tag is on main
        env:
          # The tag ref name; confined to env per the no-event-data-in-run rule.
          TAG: ${{ github.ref_name }}
        run: |
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$TAG" FETCH_HEAD; then
            echo "::error::tag $TAG does not point at a commit on main; cut releases from main only" >&2
            exit 1
          fi
          echo "tag $TAG is on main"
      - name: download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: aionforge-*
          path: release-artifacts
          merge-multiple: true
      # Sign SLSA build provenance for each release tarball (keyless, via Sigstore).
      # Verify with: gh attestation verify <file>.tar.gz --repo jscott3201/aionforge-memory
      - name: attest release binary provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: release-artifacts/*.tar.gz
      - name: create the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" release-artifacts/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" \
            --generate-notes \
            --verify-tag
