# Tag-driven, gated release publishing for aionforge-memory.
#
# Releases are cut by pushing a SemVer tag (e.g. `v1.0.0`) onto `main`. This
# workflow re-runs the full comprehensive gate (release-gate.yml) against the
# tagged commit and, only if every check passes, publishes the GitHub Release.
# A release therefore can never ship code that has not passed the gate.
#
# The artifact payload includes linux-musl binaries built through the Alpine
# Docker builder, macOS binaries, and the Alpine runtime image pushed to GHCR.
#
# workflow_dispatch runs the gate only (a dry run); publishing requires a tag push.
#
# Security: no `${{ github.event.* }}` in any `run:` (confined to if:/with:/env:).

name: release-publish

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

concurrency:
  group: release-publish-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"

permissions:
  contents: read

jobs:
  gate:
    name: gate
    uses: ./.github/workflows/release-gate.yml
    secrets: inherit

  linux-binaries:
    name: linux binary (${{ matrix.target }})
    needs: gate
    if: github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            platform: linux/amd64
          - target: aarch64-unknown-linux-musl
            platform: linux/arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: authenticate to the selene-db substrate
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.SELENE_DB_DEPLOY_KEY }}
      - uses: docker/setup-buildx-action@v3
      - name: build Alpine binary artifact
        uses: docker/build-push-action@v6
        with:
          context: .
          target: binary-artifact
          platforms: ${{ matrix.platform }}
          outputs: type=local,dest=dist/${{ matrix.target }}
          ssh: default
      - name: package binary
        run: |
          chmod +x "dist/${{ matrix.target }}/aionforge"
          tar -C "dist/${{ matrix.target }}" -czf "dist/aionforge-${{ matrix.target }}.tar.gz" aionforge
          (cd dist && shasum -a 256 "aionforge-${{ matrix.target }}.tar.gz" > "aionforge-${{ matrix.target }}.tar.gz.sha256")
      - uses: actions/upload-artifact@v4
        with:
          name: aionforge-${{ matrix.target }}
          path: |
            dist/aionforge-${{ matrix.target }}.tar.gz
            dist/aionforge-${{ matrix.target }}.tar.gz.sha256
          if-no-files-found: error

  macos-binaries:
    name: macOS binary (${{ matrix.target }})
    needs: gate
    if: github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-apple-darwin
          - aarch64-apple-darwin
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: authenticate to the selene-db substrate
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.SELENE_DB_DEPLOY_KEY }}
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: Swatinem/rust-cache@v2
      - name: add release target
        run: rustup target add "${{ matrix.target }}"
      - name: build release binary
        run: cargo build --locked --release -p aionforge-cli --target "${{ matrix.target }}"
      - name: package binary
        run: |
          mkdir -p "dist/${{ matrix.target }}"
          cp "target/${{ matrix.target }}/release/aionforge" "dist/${{ matrix.target }}/aionforge"
          chmod +x "dist/${{ matrix.target }}/aionforge"
          tar -C "dist/${{ matrix.target }}" -czf "dist/aionforge-${{ matrix.target }}.tar.gz" aionforge
          (cd dist && shasum -a 256 "aionforge-${{ matrix.target }}.tar.gz" > "aionforge-${{ matrix.target }}.tar.gz.sha256")
      - uses: actions/upload-artifact@v4
        with:
          name: aionforge-${{ matrix.target }}
          path: |
            dist/aionforge-${{ matrix.target }}.tar.gz
            dist/aionforge-${{ matrix.target }}.tar.gz.sha256
          if-no-files-found: error

  container-image:
    name: container image
    needs: gate
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: authenticate to the selene-db substrate
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.SELENE_DB_DEPLOY_KEY }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: build and push Alpine runtime image
        env:
          TAG: ${{ github.ref_name }}
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          version="${TAG#v}"
          tags=(--tag "$image:$version")
          if [[ "$version" != *-* ]]; then
            tags+=(--tag "$image:latest")
          fi
          docker buildx build \
            --ssh default \
            --push \
            --label "org.opencontainers.image.source=https://github.com/$GITHUB_REPOSITORY" \
            --label "org.opencontainers.image.revision=$GITHUB_SHA" \
            --label "org.opencontainers.image.version=$version" \
            "${tags[@]}" \
            .

  publish:
    name: publish github release
    needs:
      - gate
      - linux-binaries
      - macos-binaries
      - container-image
    # Publish only on an actual tag push; a manual dispatch is a gate-only dry run.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the tag-on-main ancestry check below can resolve.
          fetch-depth: 0
      - name: verify the tag is on main
        env:
          # The tag ref name; confined to env per the no-event-data-in-run rule.
          TAG: ${{ github.ref_name }}
        run: |
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$TAG" FETCH_HEAD; then
            echo "::error::tag $TAG does not point at a commit on main; cut releases from main only" >&2
            exit 1
          fi
          echo "tag $TAG is on main"
      - name: download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true
      - name: create the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" release-artifacts/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" \
            --generate-notes \
            --verify-tag
