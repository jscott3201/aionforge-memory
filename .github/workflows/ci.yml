# CI for aionforge-memory — runs on PRs into `development`.
#
# Workflow model: every logical change opens a PR into `development` behind this
# gate; releases batch `development` -> `main` where release.yml runs the full
# ubuntu+macOS matrix, and a version tag drives the gated publish (release.yml).
#
# Near-instant gates always run: rustfmt, file-size cap (700 LOC), no-secret scan,
# the GQL parameter-binding gate, the store-only-selene gate, and the audit-keygen
# confinement gate. When the source
# or dependency manifests change, the build-test job (clippy + nextest + doctests
# on ubuntu) and, on manifest changes, cargo-deny + THIRDPARTY.md currency run too,
# so a PR cannot merge code that fails to compile, lint, or test. Doc-only PRs skip
# the compile path and stay fast.
#
# Security: no `${{ github.event.* }}` in any `run:` (confined to if:/with:/env:).

name: ci

on:
  pull_request:
    branches: [development]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"

permissions:
  contents: read
  # dorny/paths-filter calls the PR Files API to compute which paths changed.
  pull-requests: read

jobs:
  changes:
    name: detect changes
    if: github.event.pull_request.draft == false || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      deps: ${{ steps.filter.outputs.deps }}
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            deps:
              - 'Cargo.lock'
              - 'Cargo.toml'
              - 'crates/*/Cargo.toml'
              - 'deny.toml'
              - 'about.hbs'
              - 'about.toml'
            code:
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.config/**'
              - 'rust-toolchain*'

  fmt:
    name: fmt
    if: github.event.pull_request.draft == false || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  file-size-cap:
    name: file-size cap (700 LOC)
    if: github.event.pull_request.draft == false || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash .github/scripts/check-file-size.sh

  no-secret-scan:
    name: no-secret scan
    if: github.event.pull_request.draft == false || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash .github/scripts/check-no-secrets.sh

  gql-binding-gate:
    name: GQL parameter-binding gate
    if: github.event.pull_request.draft == false || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash .github/scripts/check-no-gql-interpolation.sh

  store-only-selene-gate:
    name: store-only-selene gate
    if: github.event.pull_request.draft == false || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash .github/scripts/check-store-only-selene.sh

  audit-keygen-gate:
    name: audit-keygen confinement gate
    if: github.event.pull_request.draft == false || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash .github/scripts/check-audit-keygen-confined.sh

  build-test:
    name: build, clippy, test (ubuntu)
    needs: changes
    if: |
      (github.event.pull_request.draft == false || github.event_name == 'workflow_dispatch')
      && (needs.changes.outputs.code == 'true' || needs.changes.outputs.deps == 'true')
    runs-on: ubuntu-latest
    env:
      # Strip DWARF from the test build graph to keep ubuntu `ld` under the runner
      # mmap cap (mirrors release.yml / selene-db's CARGO_PROFILE_TEST_DEBUG=0).
      CARGO_PROFILE_TEST_DEBUG: 0
    steps:
      - uses: actions/checkout@v4
      # cargo fetches the selene-db git dependency over SSH; load the deploy key.
      - name: authenticate to the selene-db substrate
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.SELENE_DB_DEPLOY_KEY }}
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: nextest
      - run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
      - name: nextest + doctests
        run: |
          cargo nextest run --workspace --locked --all-features --profile ci
          cargo test --workspace --locked --all-features --doc
      - name: rustdoc (no broken intra-doc links)
        env:
          RUSTDOCFLAGS: -D warnings
        # --lib only: the `aionforge` lib and bin share a name, so documenting bins
        # trips an output-filename collision unrelated to doc quality.
        run: cargo doc --no-deps --workspace --lib --document-private-items --locked

  deny:
    name: cargo-deny
    needs: changes
    if: |
      (github.event.pull_request.draft == false || github.event_name == 'workflow_dispatch')
      && needs.changes.outputs.deps == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # cargo-deny runs `cargo metadata`, which fetches the selene-db git dependency
      # over SSH. Load the deploy key and run cargo-deny on the host (not the container
      # action, which would not see the SSH agent).
      - name: authenticate to the selene-db substrate
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.SELENE_DB_DEPLOY_KEY }}
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - run: cargo deny check bans licenses sources

  thirdparty-current:
    name: third-party attribution current
    needs: changes
    if: |
      (github.event.pull_request.draft == false || github.event_name == 'workflow_dispatch')
      && needs.changes.outputs.deps == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: authenticate to the selene-db substrate
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.SELENE_DB_DEPLOY_KEY }}
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-about
      - run: bash .github/scripts/check-thirdparty-current.sh
