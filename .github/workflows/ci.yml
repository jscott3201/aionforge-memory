# CI for aionforge-memory — runs on PRs into `development`.
#
# Workflow model: every logical change opens a PR into `development` behind this
# gate; releases batch `development` -> `main` where release.yml runs the full
# ubuntu+macOS matrix, and a version tag drives the gated publish (release.yml).
#
# Near-instant gates always run: rustfmt, file-size cap (700 LOC), no-secret scan,
# the GQL parameter-binding gate, the no-log-leakage gate, the store-only-selene gate,
# the audit-keygen confinement gate, and the principal mint-site gate. A cached
# rustdoc (-D warnings) job also runs.
# Console changes additionally run Svelte format/lint/type/build plus Playwright e2e checks.
# When dependency manifests change, cargo-deny + THIRDPARTY.md currency run too.
#
# The heavyweight ubuntu build/clippy/test suite deliberately does NOT run on dev
# PRs. It runs once per release batch at the `development` -> `main` release gate
# (release-gate.yml, which exercises the full ubuntu + macOS matrix), so test
# regressions surface in the release workflow rather than on every dev PR. Local
# pre-commit / pre-push hooks keep dev PRs honest in between.
#
# Security: no `${{ github.event.* }}` in any `run:` (confined to if:/with:/env:).

name: ci

on:
  pull_request:
    branches: [development]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"

permissions:
  contents: read
  # dorny/paths-filter calls the PR Files API to compute which paths changed.
  pull-requests: read

jobs:
  changes:
    name: detect changes
    if: github.event.pull_request.draft == false || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      deps: ${{ steps.filter.outputs.deps }}
      console: ${{ steps.filter.outputs.console }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            deps:
              - 'Cargo.lock'
              - 'Cargo.toml'
              - 'crates/*/Cargo.toml'
              - 'deny.toml'
              - 'about.hbs'
              - 'about.toml'
            console:
              - 'ui/console/**'
              - '.github/workflows/ci.yml'

  fmt:
    name: fmt
    if: github.event.pull_request.draft == false || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  file-size-cap:
    name: file-size cap (700 LOC)
    if: github.event.pull_request.draft == false || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash .github/scripts/check-file-size.sh

  no-secret-scan:
    name: no-secret scan
    if: github.event.pull_request.draft == false || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash .github/scripts/check-no-secrets.sh

  plugin-package:
    name: plugin package
    if: github.event.pull_request.draft == false || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash .github/scripts/check-plugin-package.sh

  gql-binding-gate:
    name: GQL parameter-binding gate
    if: github.event.pull_request.draft == false || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash .github/scripts/check-no-gql-interpolation.sh

  log-leakage-gate:
    name: no-log-leakage gate
    if: github.event.pull_request.draft == false || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash .github/scripts/check-no-log-leakage.sh

  store-only-selene-gate:
    name: store-only-selene gate
    if: github.event.pull_request.draft == false || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash .github/scripts/check-store-only-selene.sh

  audit-keygen-gate:
    name: audit-keygen confinement gate
    if: github.event.pull_request.draft == false || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash .github/scripts/check-audit-keygen-confined.sh

  principal-gate:
    name: principal mint-site gate
    if: github.event.pull_request.draft == false || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash .github/scripts/check-principal-gate.sh

  rustdoc:
    name: rustdoc (-D warnings)
    # The one compile-requiring gate on dev PRs. The heavyweight build/clippy/test
    # suite is deliberately deferred to the release gate, but doc-link breaks
    # (broken intra-doc links, missing-doc warnings) are cheap to introduce and
    # otherwise only surface at the development -> main promotion. A cached
    # `cargo doc` is fast enough to run per-PR and catches them at the source.
    if: github.event.pull_request.draft == false || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: Swatinem/rust-cache@v2
      - name: cargo doc — libs (deny warnings)
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --no-deps --workspace --lib --document-private-items
      - name: cargo doc — bins (deny warnings)
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --no-deps --workspace --bins --document-private-items

  console:
    name: console
    needs: changes
    if: |
      (github.event.pull_request.draft == false || github.event_name == 'workflow_dispatch')
      && needs.changes.outputs.console == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.2
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: ui/console/pnpm-lock.yaml
      - name: install
        working-directory: ui/console
        run: pnpm install --frozen-lockfile
      - name: format
        working-directory: ui/console
        run: pnpm format:check
      - name: lint
        working-directory: ui/console
        run: pnpm lint
      - name: typecheck
        working-directory: ui/console
        run: pnpm check
      - name: build
        working-directory: ui/console
        run: pnpm build
      - name: install playwright browsers
        working-directory: ui/console
        run: pnpm exec playwright install --with-deps chromium
      - name: e2e
        working-directory: ui/console
        run: pnpm e2e

  deny:
    name: cargo-deny
    needs: changes
    if: |
      (github.event.pull_request.draft == false || github.event_name == 'workflow_dispatch')
      && needs.changes.outputs.deps == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - run: cargo deny check bans licenses sources

  thirdparty-current:
    name: third-party attribution current
    needs: changes
    if: |
      (github.event.pull_request.draft == false || github.event_name == 'workflow_dispatch')
      && needs.changes.outputs.deps == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-about
      - run: bash .github/scripts/check-thirdparty-current.sh
