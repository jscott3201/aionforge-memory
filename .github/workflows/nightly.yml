# Nightly advisory-drift + full validation for aionforge-memory.
#
# Runs on a schedule and on push to `main`. Catches RUSTSEC advisories that
# appear between release gates (the release gate audits at PR time; advisories
# land continuously) and re-runs the full macOS validation off the per-PR path.
# selene-db is pinned to a crates.io release, but the scheduled run still surfaces
# substrate drift early: it `cargo update`s the selene-db crates to the latest
# semver-compatible 1.x release before building, rather than running --locked.
#
# Security: no `${{ github.event.* }}` in any `run:` (confined to if:/with:/env:).

name: nightly

on:
  schedule:
    - cron: "27 8 * * *"
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: nightly-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"

permissions:
  contents: read

jobs:
  audit-drift:
    name: cargo-audit advisory drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
      - name: pull the latest substrate commit (drift)
        run: cargo update -p selene-db-core -p selene-db-graph -p selene-db-persist -p selene-db-gql -p selene-db-algorithms
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - run: cargo audit --color always

  macos-validation:
    name: macOS full validation
    runs-on: macos-latest
    env:
      CARGO_PROFILE_TEST_DEBUG: 0
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: nextest
      # Nightly builds against the latest released substrate to surface drift early, so it
      # updates the selene-db crates within the 1.x line rather than building --locked.
      - name: pull the latest substrate commit (drift)
        run: cargo update -p selene-db-core -p selene-db-graph -p selene-db-persist -p selene-db-gql -p selene-db-algorithms
      - name: clippy + tests
        run: |
          cargo clippy --workspace --all-targets --all-features -- -D warnings
          cargo nextest run --workspace --all-features --profile ci
          cargo test --workspace --all-features --doc
