# Release gate for aionforge-memory — runs on PRs into `main` (development -> main).
#
# Everyday work merges into `development` behind ci.yml + local hooks. A release
# batches `development` into a single PR against `main`; this workflow runs the
# comprehensive pre-merge gate defined once in release-gate.yml. The same gate runs
# again at tag time (release-publish.yml), so a published release is always gated.
#
# Security: no `${{ github.event.* }}` in any `run:` (confined to if:/with:/env:).

name: release

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gate:
    name: gate
    # Skip drafts; full gate runs once the PR is ready (or on manual dispatch).
    if: github.event.pull_request.draft == false || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/release-gate.yml
    secrets: inherit
