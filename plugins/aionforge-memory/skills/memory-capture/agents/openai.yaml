interface:
  display_name: "Memory Capture"
  short_description: "Persist decisions, facts, handoffs, and outcomes"
  default_prompt: "Capture durable decisions, validation results, user preferences, and handoffs in Aionforge Memory."
dependencies:
  tools:
    - type: "mcp"
      value: "aionforge-memory"
      description: "Aionforge Memory MCP server"
      transport: "streamable_http"
      url: "http://127.0.0.1:3918/mcp"
policy:
  allow_implicit_invocation: true
